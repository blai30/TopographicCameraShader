[plugin]

name="Topographic Camera Shader"
description="Depth-based topographic-map post-process. A drop-in CompositorEffect that recolors any camera into a stepped, contoured topographic map using only the depth buffer. Gradient elevation tinting, contour lines, ready-made presets, and a pre-configured camera prefab."
author="Brian Lai"
version="1.0.0"
script="TopographicPlugin.cs"
